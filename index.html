<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jogo da Forca</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topo">
  <h1>Jogo da Forca</h1>
  <div class="botoes-topo">
    <button id="btnIniciar">Novo Jogo</button>
    <button id="btnCadastrar">Cadastrar Palavra</button>
  </div>
</header>

<main>
  <section id="cadastro" style="display: none;">
    <h2>Cadastrar Nova Palavra</h2>
    <form id="formCadastro">
      <label for="novaPalavra">Palavra:</label>
      <input type="text" id="novaPalavra" required autocomplete="off">

      <label for="novoTema">Tema:</label>
      <input type="text" id="novoTema" required>

      <label for="novaDificuldade">Dificuldade:</label>
      <select id="novaDificuldade" required>
        <option value="Fácil">Fácil</option>
        <option value="Médio">Médio</option>
        <option value="Difícil">Difícil</option>
      </select>

      <button type="submit">Cadastrar</button>
    </form>
  </section>

  <section id="jogo">
    <h2 id="temaAtual">Tema: —</h2>

    <figure>
      <pre id="forca"></pre>
    </figure>

    <div id="palavra"></div>

    <div id="teclado"></div>

    <div id="mensagem" class="mensagem"></div>

    <div id="tentativas">
      Tentativas restantes: <span id="errosRestantes">6</span>
    </div>

    <button id="btnReiniciar" style="display:none;">Jogar Novamente</button>
  </section>
</main>

<footer>
  <p>Jogo da Forca • Feito com HTML, CSS e JavaScript</p>
</footer>

<script src="script.js"></script>
</body>
</html>
