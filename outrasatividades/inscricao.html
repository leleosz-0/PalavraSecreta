<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>1º Hackathon de Informática da Escola</title>
</head>
<body>

    <h1>1º Hackathon de Informática da Escola</h1>

    <form>

        <!-- BLOCO 1 -->
        <fieldset>
            <legend>Dados Pessoais</legend>

            <label for="nome">Nome Completo:</label><br>
            <input type="text" id="nome" name="nome" required>
            <br><br>

            <label for="email">E-mail:</label><br>
            <input type="email" id="email" name="email" required>
            <br><br>

            <label for="senha">Senha para o sistema:</label><br>
            <input type="password" id="senha" name="senha" required minlength="6">
            <br><br>

            <label for="nascimento">Data de Nascimento:</label><br>
            <input type="date" id="nascimento" name="nascimento" required>
        </fieldset>

        <br>

        <!-- BLOCO 2 -->
        <fieldset>
            <legend>Perfil Técnico</legend>

            <p>Linguagens de interesse:</p>

            <input type="checkbox" id="html" name="linguagens" value="HTML">
            <label for="html">HTML</label><br>

            <input type="checkbox" id="css" name="linguagens" value="CSS">
            <label for="css">CSS</label><br>

            <input type="checkbox" id="js" name="linguagens" value="JavaScript">
            <label for="js">JavaScript</label><br>

            <input type="checkbox" id="python" name="linguagens" value="Python">
            <label for="python">Python</label>

            <br><br>

            <p>Nível de experiência:</p>

            <input type="radio" id="iniciante" name="nivel" value="Iniciante" required>
            <label for="iniciante">Iniciante</label><br>

            <input type="radio" id="intermediario" name="nivel" value="Intermediário">
            <label for="intermediario">Intermediário</label><br>

            <input type="radio" id="avancado" name="nivel" value="Avançado">
            <label for="avancado">Avançado</label>

            <br><br>

            <label for="curriculo">Anexar currículo ou portfólio:</label><br>
            <input type="file" id="curriculo" name="curriculo">
        </fieldset>

        <br>

        <!-- BLOCO 3 -->
        <fieldset>
            <legend>Detalhes do Evento</legend>

            <label for="camiseta">Tamanho da camiseta:</label><br>
            <select id="camiseta" name="camiseta" required>
                <option value="">Selecione</option>
                <option value="P">P</option>
                <option value="M">M</option>
                <option value="G">G</option>
                <option value="GG">GG</option>
            </select>

            <br><br>

            <label for="motivacao">Carta de motivação:</label><br>
            <textarea id="motivacao" name="motivacao" rows="5" cols="40" placeholder="Explique por que deseja participar..." required></textarea>
        </fieldset>

        <br>

        <button type="submit">Enviar Inscrição</button>

    </form>

</body>
</html>
